name: Trigger Render Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Install Render CLI
        run: |
          curl -fsSL -o render-cli.zip https://github.com/render-oss/cli/releases/download/v2.21.0/cli_2.21.0_linux_amd64.zip
          mkdir -p render-cli
          unzip -q render-cli.zip -d render-cli
          find render-cli -maxdepth 2 -type f -print
          cli_path="$(find render-cli -maxdepth 2 -type f \( -name 'render*' -o -name 'cli*' \) | head -n 1)"
          if [ -z "$cli_path" ]; then
            echo "Render CLI binary not found"
            exit 1
          fi
          chmod +x "$cli_path"
          echo "RENDER_BIN=$cli_path" >> "$GITHUB_ENV"

      - name: Configure Render CLI
        run: |
          mkdir -p ~/.render
          cat > ~/.render/cli.yaml <<EOF
          version: 1
          workspace: ${{ secrets.RENDER_CLI_WORKSPACE }}
          api:
              key: ${{ secrets.RENDER_CLI_KEY }}
              expires_at: ${{ secrets.RENDER_CLI_EXPIRES_AT }}
              host: https://api.render.com/v1/
              refreshtoken: ${{ secrets.RENDER_CLI_REFRESH_TOKEN }}
          dashboard_url: https://dashboard.render.com
          EOF

      - name: Trigger deploy
        run: "$RENDER_BIN" deploys create srv-d8chgomk1jcs738tu1q0 --confirm --output text