name: Deploy latest Siyu Factory fixes

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore latest studio build
        shell: bash
        run: |
          set -euo pipefail
          echo '' | base64 -d > /tmp/siyu-latest.tgz
          tar -xzf /tmp/siyu-latest.tgz
          rm -f .github/workflows/deploy-latest.yml

      - name: Verify
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          npm run typecheck
          npm run lint
          npm run build

      - name: Commit fixed site
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Fix generation status, history, credits, and downloads"
          git push
