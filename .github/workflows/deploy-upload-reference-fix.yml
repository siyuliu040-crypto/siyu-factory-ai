name: Deploy upload reference fix
on: [push]
permissions:
  contents: write
jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch reference upload support
        shell: bash
        run: |
          cat > src/app/api/videos/generate/route.ts <<'EOF'
          import { forwardJson, jsonError } from "@/lib/hellobabygo";
          import { randomUUID } from "crypto";
          import { mkdir, writeFile } from "fs/promises";
          import path from "path";

          const UPLOAD_DIR = "/tmp/siyu-factory-uploads";
          const MIME_EXTENSIONS: Record<string, string> = {
            "image/jpeg": "jpg",
            "image/png": "png",
            "image/webp": "webp"
          };

          async function fileToPublicUrl(request: Request, file: File) {
            const buffer = Buffer.from(await file.arrayBuffer());
            const mediaType = file.type || "image/jpeg";
            const extension = MIME_EXTENSIONS[mediaType] || "jpg";
            const id = `${randomUUID()}.${extension}`;
            await mkdir(UPLOAD_DIR, { recursive: true });
            await writeFile(path.join(UPLOAD_DIR, id), buffer);
            return new URL(`/api/uploads/${id}`, request.url).toString();
          }

          export async function POST(request: Request) {
            try {
              const incoming = await request.formData();
              const model = String(incoming.get("model") || "");
              const prompt = String(incoming.get("prompt") || "").trim();

              if (!model || !prompt) {
                return jsonError({ error: "model and prompt are required" }, 400);
              }

              const seconds = incoming.get("seconds");
              const size = incoming.get("size");
              const imageUrl = incoming.get("image_url");
              const references = incoming
                .getAll("input_reference")
                .filter((value): value is File => value instanceof File && value.size > 0);
              const uploadedReferenceUrls = await Promise.all(references.map((reference) => fileToPublicUrl(request, reference)));
              const referenceUrls = [
                ...(imageUrl ? [String(imageUrl)] : []),
                ...uploadedReferenceUrls
              ].filter(Boolean);

              if (references.length === 0) {
                return await forwardJson("/v1/videos", {
                  method: "POST",
                  body: JSON.stringify({
                    model,
                    prompt,
                    ...(seconds ? { seconds: String(seconds) } : {}),
                    ...(size ? { size: String(size) } : {}),
                    ...(imageUrl ? { image_url: String(imageUrl), image_input: [String(imageUrl)], input_reference: String(imageUrl) } : {})
                  })
                });
              }

              return await forwardJson("/v1/videos", {
                method: "POST",
                body: JSON.stringify({
                  model,
                  prompt,
                  ...(seconds ? { seconds: String(seconds) } : {}),
                  ...(size ? { size: String(size) } : {}),
                  image_url: referenceUrls[0],
                  image_input: referenceUrls,
                  input_reference: referenceUrls[0]
                })
              });
            } catch (error) {
              const detail = error instanceof Error ? error.message : error;
              return jsonError({
                error: "Video generation request failed",
                message:
                  "Video generation failed before the upstream task was created. Try fewer or smaller reference images, then submit again.",
                detail
              });
            }
          }
          EOF

          mkdir -p 'src/app/api/uploads/[id]'
          cat > 'src/app/api/uploads/[id]/route.ts' <<'EOF'
          import { readFile } from "fs/promises";
          import path from "path";

          const UPLOAD_DIR = "/tmp/siyu-factory-uploads";
          const CONTENT_TYPES: Record<string, string> = {
            jpg: "image/jpeg",
            jpeg: "image/jpeg",
            png: "image/png",
            webp: "image/webp"
          };

          export async function GET(_request: Request, { params }: { params: Promise<{ id: string }> }) {
            const { id } = await params;
            if (!/^[a-f0-9-]+\.(jpg|jpeg|png|webp)$/i.test(id)) {
              return new Response("Not found", { status: 404 });
            }

            try {
              const file = await readFile(path.join(UPLOAD_DIR, id));
              const extension = id.split(".").pop()?.toLowerCase() || "jpg";
              return new Response(file, {
                headers: {
                  "Cache-Control": "public, max-age=3600",
                  "Content-Type": CONTENT_TYPES[extension] || "image/jpeg"
                }
              });
            } catch {
              return new Response("Not found", { status: 404 });
            }
          }
          EOF

          node <<'NODE'
          const fs = require('fs');
          const file = 'src/components/studio.tsx';
          let source = fs.readFileSync(file, 'utf8');
          source = source.replace(
            /const stableVideoModels = \[[\s\S]*?\];/,
            'const stableVideoModels = [\n  "veo_3_1-fast-portrait",\n  "veo_3_1-fast-landscape",\n  "veo_3_1-fast-portrait-hd",\n  "veo_3_1-fast-landscape-hd"\n];'
          );
          source = source.replace(
            /  "veo_3_1-fast-portrait": 1200000,\n  "veo_3_1-fast-landscape": 1200000(?:,\n  "veo_3_1-fast-portrait-hd": 1200000,\n  "veo_3_1-fast-landscape-hd": 1200000)?/,
            '  "veo_3_1-fast-portrait": 1200000,\n  "veo_3_1-fast-landscape": 1200000,\n  "veo_3_1-fast-portrait-hd": 1200000,\n  "veo_3_1-fast-landscape-hd": 1200000'
          );
          source = source.replace(
            /function getReferenceVideoModel\(size: string\) \{[\s\S]*?\n\}/,
            'function getReferenceVideoModel(size: string) {\n  return size.includes("1280x720")\n    ? "veo_3_1-fast-landscape-hd"\n    : "veo_3_1-fast-portrait-hd";\n}'
          );
          fs.writeFileSync(file, source);
          NODE

          rm -f .github/workflows/deploy-upload-reference-fix.yml
          npm ci
          npm run typecheck
          npm run lint
          npm run build
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Support uploaded reference images for video" || exit 0
          git push
