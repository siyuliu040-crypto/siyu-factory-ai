services:
  - type: web
    name: siyu-factory-ai
    env: node
    plan: free
    buildCommand: npm ci && node node_modules/next/dist/bin/next build
    startCommand: node scripts/start.mjs
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 24
      - key: HELLOBABYGO_API_KEY
        sync: false
      - key: HELLOBABYGO_API_BASE_URL
        value: https://api.hellobabygo.com
      - key: VIDU_API_KEY
        sync: false
      - key: VIDU_API_BASE_URL
        value: https://api.vidu.cn
      - key: SIYU_PUBLIC_BASE_URL
        value: https://siyu-factory-ai.onrender.com
      - key: SIYU_GITHUB_STORAGE_REPO
        value: siyuliu040-crypto/siyu-factory-ai
      - key: SIYU_GITHUB_STORAGE_PATH
        value: .data/siyu-factory-accounts.json
      - key: SIYU_GITHUB_STORAGE_BRANCH
        value: main
      - key: SIYU_GITHUB_STORAGE_TOKEN
        sync: false
